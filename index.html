<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador de Tablas de Bingo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0 auto;
            padding: 15px;
            max-width: 1200px;
        }

        .section {
            margin-bottom: 25px;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 3px;
            margin: 15px 0;
            max-width: 300px;
        }

        .input-cell {
            width: 100%;
            height: 40px;
            text-align: center;
            border: 1px solid #999;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .free-space {
            background-color: #eee;
            font-size: 0.7em;
        }

        .bingo-table {
            display: block;
            margin: 15px auto;
            padding: 10px;
            border: 2px solid #666;
            border-radius: 8px;
            max-width: 300px;
        }

        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 2px;
            margin: 10px 0;
        }

        .bingo-cell {
            width: 100%;
            aspect-ratio: 1;
            border: 1px solid #999;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            background-color: white;
            box-sizing: border-box;
        }

        .highlight {
            background-color: #ffeb3b !important;
        }

        .controls {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        button {
            padding: 8px 12px;
            margin: 3px;
            font-size: 14px;
            flex: 1;
            min-width: 120px;
        }

        input[type="text"] {
            padding: 8px;
            margin: 5px 0;
            width: 100%;
            box-sizing: border-box;
            max-width: 300px;
        }

        .search-section {
            margin: 15px 0;
        }

        h2 {
            font-size: 1.3em;
            margin: 10px 0;
        }

        h3 {
            font-size: 1.1em;
            margin: 8px 0;
            text-align: center;
        }

        @media (min-width: 600px) {
            .bingo-table {
                display: inline-block;
                margin: 10px;
                max-width: none;
            }
            
            .input-grid {
                max-width: none;
            }
            
            .input-cell {
                height: 50px;
                font-size: 16px;
            }
            
            button {
                flex: none;
                min-width: auto;
            }
            
            .bingo-cell {
                font-size: 16px;
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="section">
        <h2>Crear Nueva Tabla</h2>
        <div class="input-grid" id="inputGrid"></div>
        <input type="text" id="tableName" placeholder="Nombre de la tabla">
        <div class="controls">
            <button onclick="createBingoTable()">Crear Tabla</button>
            <button onclick="clearInputs()">Limpiar Campos</button>
        </div>
    </div>

    <div class="section search-section">
        <h2>Buscar Número</h2>
        <input type="text" id="searchInput" placeholder="Ingrese número a buscar">
        <div class="controls">
            <button onclick="searchNumber()">Buscar</button>
            <button onclick="clearAllHighlights()" class="clear-all">Limpiar Todo</button>
        </div>
    </div> 

    <div id="tablesContainer"></div>


    <script>
        // Variable para almacenar todas las tablas
        let bingoTables = [];
    
        // Al cargar la página
        document.addEventListener('DOMContentLoaded', () => {
            initializeInputGrid();
            loadSavedTables();
        });
    
        // Inicializar la cuadrícula de entrada
        function initializeInputGrid() {
            const grid = document.getElementById('inputGrid');
            grid.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('input');
                cell.type = 'text';
                cell.className = 'input-cell';
                cell.maxLength = 2;
                
                if (i === 12) {
                    cell.placeholder = 'FREE';
                    cell.disabled = true;
                    cell.className = 'input-cell free-space';
                }
                grid.appendChild(cell);
            }
        }
    
        // Guardar tablas en localStorage
        function saveTables() {
            localStorage.setItem('bingoTables', JSON.stringify(bingoTables));
        }
    
        // Cargar tablas guardadas
        function loadSavedTables() {
            const saved = localStorage.getItem('bingoTables');
            if (saved) {
                bingoTables = JSON.parse(saved);
                bingoTables.forEach(createTableElement);
            }
        }
    
        // Crear nueva tabla (modificada para persistencia)
        function createBingoTable() {
            const inputs = document.querySelectorAll('#inputGrid .input-cell:not(.free-space)');
            const tableName = document.getElementById('tableName').value;
    
            // Validar campos
            let isValid = true;
            inputs.forEach(input => {
                if (!input.value.trim()) isValid = false;
            });
    
            if (!isValid) {
                alert('¡Debes llenar todos los campos!');
                return;
            }
    
            // Crear objeto de tabla
            const newTable = {
                name: tableName || 'Tabla sin nombre',
                numbers: []
            };
    
            // Llenar números
            for (let i = 0; i < 25; i++) {
                newTable.numbers.push(
                    i === 12 ? 'FREE' : inputs[i < 12 ? i : i - 1].value
                );
            }
    
            // Guardar y crear
            bingoTables.push(newTable);
            saveTables();
            createTableElement(newTable);
            clearInputs();
        }
    
        // Crear elemento HTML de tabla (modificado para persistencia)
        function createTableElement(tableData) {
            const tableDiv = document.createElement('div');
            tableDiv.className = 'bingo-table';
            
            // Nombre
            const nameElement = document.createElement('h3');
            nameElement.textContent = tableData.name;
            
            // Grid
            const grid = document.createElement('div');
            grid.className = 'bingo-grid';
            
            tableData.numbers.forEach(number => {
                const cell = document.createElement('div');
                cell.className = 'bingo-cell';
                cell.textContent = number;
                if (number === 'FREE') cell.style.backgroundColor = '#eee';
                grid.appendChild(cell);
            });
    
            // Botones de control
            const controls = document.createElement('div');
            controls.className = 'controls';
            
            // Botón eliminar
            const deleteButton = document.createElement('button');
            deleteButton.textContent = 'Eliminar Tabla';
            deleteButton.onclick = () => {
                // Eliminar de la lista y almacenamiento
                bingoTables = bingoTables.filter(t => t !== tableData);
                saveTables();
                tableDiv.remove();
            };
            
            // Botón limpiar marcadores
            const clearButton = document.createElement('button');
            clearButton.textContent = 'Limpiar Marcadores';
            clearButton.onclick = () => {
                grid.querySelectorAll('.bingo-cell').forEach(cell => {
                    cell.classList.remove('highlight');
                });
            };
    
            controls.appendChild(deleteButton);
            controls.appendChild(clearButton);
    
            // Ensamblar
            tableDiv.appendChild(nameElement);
            tableDiv.appendChild(grid);
            tableDiv.appendChild(controls);
            document.getElementById('tablesContainer').appendChild(tableDiv);
        }
    
        // Limpiar campos de entrada
        function clearInputs() {
            document.querySelectorAll('#inputGrid .input-cell:not(.free-space)').forEach(input => {
                input.value = '';
            });
            document.getElementById('tableName').value = '';
        }
    
        // Buscar número
        function searchNumber() {
            const searchValue = document.getElementById('searchInput').value.trim();
            if (!searchValue) return;
            
            document.querySelectorAll('.bingo-cell').forEach(cell => {
                if (cell.textContent === searchValue && cell.textContent !== 'FREE') {
                    cell.classList.add('highlight');
                }
            });
            document.getElementById('searchInput').value = '';
        }
    
        // Limpiar todos los resaltados
        function clearAllHighlights() {
            document.querySelectorAll('.bingo-cell').forEach(cell => {
                cell.classList.remove('highlight');
            });
        }
    </script>
</body>
</html>
